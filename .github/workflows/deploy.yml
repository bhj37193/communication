name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets (G-04/G-09)
        id: check
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ] || [ -z "${{ secrets.SSH_KEY }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: No-op (deploy secrets not configured)
        if: steps.check.outputs.ready == 'false'
        run: echo "::notice::Deploy skipped — SSH_HOST/SSH_USER/SSH_KEY GitHub secrets are not set (see gate G-04 in BUILD-EXECUTION-PLAN.md). Provision the VPS and add those secrets to enable deploys."

      - name: Deploy to VPS
        if: steps.check.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/charisma
            git pull
            docker compose --profile prod pull
            docker compose --profile prod up -d --build
