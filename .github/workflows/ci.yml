name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: main
          POSTGRES_DB: charisma_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @charisma/server db:migrate
        env:
          DATABASE_URL_OWNER: postgres://main@localhost:5432/charisma_test
      - run: pnpm -r typecheck
      - run: pnpm --filter @charisma/core test
      - run: pnpm --filter @charisma/content validate
      - run: pnpm --filter @charisma/server test
      - run: pnpm --filter @charisma/server test:integration
      - run: pnpm e2e:smoke
      - run: pnpm --filter @charisma/mobile test
